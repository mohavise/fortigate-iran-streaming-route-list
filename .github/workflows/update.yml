name: Update FortiGate Iran Streaming Feed

on:
  schedule:
    # Runs after the MikroTik source repository update.
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-fortigate-iran-streaming-feed
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build and validate FortiGate outputs
        run: bash ./scripts/build-fortigate-iran-streaming.sh

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add fortigate-iran-streaming-domains.txt fortigate-iran-streaming-address-objects.conf

          if git diff --cached --quiet; then
            echo "No FortiGate Iran streaming output changes"
            exit 0
          fi

          git commit -m "Update FortiGate Iran streaming outputs"
          git pull --rebase origin main
          git push origin HEAD:main
