name: Update FortiGate Iran Streaming Feed

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build FortiGate domain feed
        run: |
          chmod +x scripts/build-fortigate-iran-streaming.sh
          ./scripts/build-fortigate-iran-streaming.sh

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add fortigate-iran-streaming-domains.txt

          if git diff --cached --quiet; then
            echo "No FortiGate Iran streaming feed changes"
          else
            git commit -m "Automatic FortiGate Iran streaming feed update"
            git push
          fi
